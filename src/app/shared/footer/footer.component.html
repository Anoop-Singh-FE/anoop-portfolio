<footer>
    <div class="footer-container">

        <div class="footer-brand">
            <div class="footer-logo">
                <span class="logo-bracket">{{ openBracket }}</span>
                Anoop
                <span class="logo-bracket">{{ closeBracket }}</span>
            </div>
            <p>Senior Frontend Engineer crafting scalable Angular applications.</p>
        </div>

        <div class="footer-links">
            <a *ngFor="let link of links" [routerLink]="link.path">
                {{ link.label }}
            </a>
        </div>

        <div class="footer-socials">
            <a *ngFor="let s of socials" [href]="s.url" target="_blank" rel="noopener">
                {{ s.label }}
            </a>
        </div>

    </div>

    <div class="footer-bottom">
        <p>{{ openBracket }} {{ year }} Anoop Singh {{ closeBracket }}</p>
    </div>
</footer>
