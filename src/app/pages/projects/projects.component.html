<div class="projects-page">
    <div class="section-container">

        <!-- Header -->
        <div class="page-header">
            <div class="section-label">My Work</div>
            <h1 class="section-title">Projects</h1>
            <p class="section-sub">
                A collection of projects I've built professionally and personally.
                More coming soon as I build in public.
            </p>
        </div>

        <!-- Filters -->
        <div class="filters">
            <button *ngFor="let f of filters" class="filter-btn" [class.active]="activeFilter === f"
                (click)="setFilter(f)">
                {{ f }}
            </button>
        </div>

        <!-- Projects Grid -->
        <div class="projects-grid">
            <div *ngFor="let project of filteredProjects" class="project-card" [class.featured]="project.featured">

                <!-- Top bar -->
                <div class="card-top">
                    <div class="card-icons">
                        <div class="folder-icon">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
                                <path
                                    d="M3 7C3 5.9 3.9 5 5 5H9L11 7H19C20.1 7 21 7.9 21 9V17C21 18.1 20.1 19 19 19H5C3.9 19 3 18.1 3 17V7Z"
                                    stroke="#6c8eff" stroke-width="1.5" stroke-linecap="round" />
                            </svg>
                        </div>
                        <div class="card-links">
                            <a [href]="project.github" target="_blank" rel="noopener" title="GitHub">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path
                                        d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22" />
                                </svg>
                            </a>
                            <a [href]="project.live" target="_blank" rel="noopener" title="Live Demo">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
                                    <polyline points="15 3 21 3 21 9" />
                                    <line x1="10" y1="14" x2="21" y2="3" />
                                </svg>
                            </a>
                        </div>
                    </div>
                    <span *ngIf="project.featured" class="featured-badge">Featured</span>
                </div>

                <!-- Content -->
                <h3 class="card-title">{{ project.title }}</h3>
                <p class="card-desc">{{ project.description }}</p>

                <!-- Tags -->
                <div class="card-tags">
                    <span *ngFor="let tag of project.tags" class="tag">{{ tag }}</span>
                </div>

                <!-- Status -->
                <div class="card-status" [class.in-progress]="project.status === 'in-progress'">
                    <span class="status-dot"></span>
                    {{ project.status === 'completed' ? 'Completed' : 'In Progress' }}
                </div>

            </div>
        </div>

    </div>
</div>
